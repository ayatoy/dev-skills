interface:
  display_name: "Dev Recap Session"
  short_description: "Write one handoff recap with repeated-work and skill-opportunity analysis"
  default_prompt: "Use $dev-recap to summarize the current session or workstream into one detailed recap note under $PWD/docs/recaps. Reuse the active same-session recap when appropriate, include repeated-work analysis, and recommend only concrete skill opportunities that clear a real reuse bar."
