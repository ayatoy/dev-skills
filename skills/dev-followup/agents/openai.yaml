interface:
  display_name: "Dev Sync Follow-up Plan"
  short_description: "Update an existing ExecPlan and only the downstream docs justified by a narrow follow-up"
  default_prompt: "Use $dev-followup to synchronize one existing ExecPlan-led workstream after a narrow follow-up change. Treat the plan as the primary artifact, update its living sections to match the current implementation and validation state, and update related spec, walkthrough, or recap artifacts only when the propagation rules justify it."
