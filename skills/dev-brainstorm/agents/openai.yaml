interface:
  display_name: "Dev Brainstorm Brief"
  short_description: "Turn free-form discussion into one evolving inbox brief under $PWD/docs/inbox"
  default_prompt: "Use $dev-brainstorm to run an open-ended brainstorming conversation from the given input or current session, create or update one canonical inbox note under $PWD/docs/inbox, and keep distilling the discussion into a compact upstream brief. Stay in brainstorming mode until the user gives explicit transition intent, and do not start downstream workflow phases or implementation while brainstorming is still active."
