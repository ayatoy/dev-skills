interface:
  display_name: "Dev Review Changes"
  short_description: "Run a two-pass review and save one deduplicated note under $PWD/docs/reviews"
  default_prompt: "Use $dev-review to review the current changes or a code area in two passes: first find concrete issues, then check intent, security, regression risk, tests, operations, and AI readability. Before reviewing, inspect the latest same-target review artifact and emit only net-new findings or material status changes."
